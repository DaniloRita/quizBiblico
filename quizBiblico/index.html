<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ICEI Bíblico</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="imagem/TelaInicial-Fundo.jpeg" type="image/x-icon">
</head>
<body>

<div id="telaInicial">
    <button id="btnConfig" onclick="abrirConfiguracoes()">⚙️</button>

    <h1>📖 Quiz Bíblico</h1>
   
    <input type="text" id="nomeJogador" placeholder="Digite seu nome">

    <button id="btnIniciar" onclick="abrirNivel()">▶️ Jogar</button>
    <button onclick="iniciarDesafio()">🔥 Modo Desafio</button>
    <button onclick="verHistorico()">📜 Histórico</button>

<button id="btnLogin" onclick="loginGoogle()" style="
    background: #4285F4;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 5px;
    margin-top: 10px;
">
🔐 Login com Google
</button>
</div>

<!-- 🔥 AGORA FORA -->
<div id="historicoBox">

    <button onclick="fecharHistorico()">⬅️ Voltar</button>

    <h2>📜 Histórico</h2>

<div id="tabsRanking">
    <span onclick="mostrarRanking('normal')" id="tabMundial">🌍 Mundial</span>
    <span onclick="mostrarRanking('desafio')" id="tabDesafio">🔥 Desafio</span>
</div>

<div id="historicoConteudo"></div>

</div>

<section id="quiz">
    <div class="topo">
        <p id="vidas">❤️ 3</p>
        <span id="tempo">⏱️ 30</span>
        <p id="pontuacao">⭐ 0</p>

        <div id="barraTempo">
            <div id="progressoTempo"></div>
        </div>

        <div class="controles">
            <button id="btnPause" class="btn-controle" onclick="pausarJogo()">⏸</button>
            <button class="btn-controle" onclick="reiniciarJogo()">🔄</button>
        </div>
    </div>

    <div class="container">
        <h2 id="pergunta">Pergunta Aqui</h2>

        <button onclick="responder(0)" id="op0"></button>
        <button onclick="responder(1)" id="op1"></button>
        <button onclick="responder(2)" id="op2"></button>
        <button onclick="responder(3)" id="op3"></button>

        <p id="resultado"></p>
    </div>

    <div id="overlayFinal">
        <div class="cardFinal">
            <h2>🏆 Resultado</h2>
            <p id="pontuacaoFinal">0</p>
            <button onclick="reiniciarJogo()">🔄 Tentar novamente</button>
            <button onclick="sairJogo()">❌ Sair</button>

        </div>
    </div>
    <div id="informacao">
    <p>📖 Quiz Bíblico<br><ins>Desenvolvedor: &COPY; Daniscarline</ins></p>
</div>
</section>
<div id="menuConfig">
    <div class="boxConfig">
        <h2>⚙️ Configurações</h2>

        <label>🎵 Volume</label>
        <input type="range" min="0" max="1" step="0.1" onchange="mudarVolume(this.value)">

        <button onclick="toggleModoEscuro()">🌙 Modo Escuro</button>
        <button onclick="resetarProgresso()">🔄 Resetar Progresso</button>
        <button onclick="trocarNome()">👤 Trocar Nome</button>
        <button  onclick="saberMais()"> Saber mais sobre o apk</button>
        <button onclick="fecharConfig()">❌ Fechar</button>
    </div>
</div>
<div id="menuNivel">
    <div class="boxConfig">
        <h2>🎮 Escolher Nível</h2>

        <button onclick="escolherNivel('facil')">🟢 Fácil</button>
        <button onclick="escolherNivel('medio')">🟡 Médio</button>
        <button onclick="escolherNivel('dificil')">🔴 Difícil</button>
    </div>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getAuth, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


  const firebaseConfig = {
    apiKey: "AIzaSyC1qT3SGgwv2GQOQRUt4QIFp4acJOt7Z3Q",
    authDomain: "quiz-biblico-5e71e.firebaseapp.com",
    projectId: "quiz-biblico-5e71e",
    storageBucket: "quiz-biblico-5e71e.appspot.com",
    messagingSenderId: "1065039796116",
    appId: "1:1065039796116:web:6d58c6e63c451e1f4fe181"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

    const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // 🔥 deixa global
  window.db = db;
  window.auth = auth;
  window.provider = provider;


</script>


<script type="module" src="app.js"></script>


</body>

</html>
