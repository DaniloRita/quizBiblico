<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ICEI Bíblico</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="imagem/telaInicial-logo.png" type="image/x-icon">
</head>
<body>

<div id="telaInicial">
    <h1>📖 Quiz Bíblico</h1>
   
    <input type="text" id="nomeJogador" placeholder="Digite seu nome">

    <button id="btnIniciar" onclick="iniciarJogo()">▶️ Jogar</button>
    <button id="btnSobre" onclick="mostrarSobre()">ℹ️ Sobre</button>
    <button onclick="verHistorico()">📜 Histórico</button>
</div>

<!-- 🔥 AGORA FORA -->
<div id="historicoBox">

    <button onclick="fecharHistorico()">⬅️ Voltar</button>

    <h2>📜 Histórico</h2>

    <div id="historicoConteudo"></div>

</div>

<section id="quiz">
    <div class="topo">
        <span id="tempo">⏱️ 30</span>
        <p id="pontuacao">⭐ 0</p>

        <div id="barraTempo">
            <div id="progressoTempo"></div>
        </div>

        <div class="controles">
            <button class="btn-controle" onclick="pausarJogo()">⏸</button>
            <button class="btn-controle" onclick="reiniciarJogo()">🔄</button>
        </div>
    </div>

    <div class="container">
        <h2 id="pergunta">Pergunta Aqui</h2>

        <button onclick="responder(0)" id="op0"></button>
        <button onclick="responder(1)" id="op1"></button>
        <button onclick="responder(2)" id="op2"></button>
        <button onclick="responder(3)" id="op3"></button>

        <p id="resultado"></p>
    </div>

    <div id="overlayFinal">
        <div class="cardFinal">
            <h2>🏆 Resultado</h2>
            <p id="pontuacaoFinal">0</p>
            <button onclick="reiniciarJogo()">🔄 Tentar novamente</button>
        </div>
    </div>
    <div id="sobreBox" style="display:none;">
    <p>📖 Quiz Bíblico<br>Desenvolvedor: Daniscarline</p>
    <button onclick="fecharSobre()">Fechar</button>
</div>

</section>

<script src="app.js"></script>
</body>

</html>
